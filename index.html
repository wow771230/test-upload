<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📝 待办事项</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📝 我的待办事项</h1>
            <p class="subtitle">简单高效地管理你的每一天</p>
        </header>

        <div class="input-section">
            <input type="text" id="todoInput" placeholder="输入新的待办事项..." autocomplete="off">
            <button id="addBtn">➕ 添加</button>
        </div>

        <div class="filter-section">
            <button class="filter-btn active" data-filter="all">全部</button>
            <button class="filter-btn" data-filter="pending">进行中</button>
            <button class="filter-btn" data-filter="completed">已完成</button>
        </div>

        <ul id="todoList" class="todo-list"></ul>

        <div class="stats">
            <span id="pendingCount">0 项待完成</span>
            <button id="clearBtn">🗑️ 清除已完成</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
